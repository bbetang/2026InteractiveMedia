    <title>WWWORKBOOK</title>
<style>
    body, html {
    margin: 0;
    padding: 0;
    min-height: 100%; 
}
    html {
        background-image: linear-gradient(to bottom, rgb(245, 245, 245), rgb(183, 229, 229));
    }
    body {
    font-family: "Montserrat", Times, serif;
  }
  

body {
  
  cursor: url('images/fishcursor.svg'), auto;
}

body {
  background-image: url("images/bowl.svg");
  background-repeat: no-repeat;
  background-size: cover;
}
.background-svg {
  position: absolute; 
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1; 
}
.button {
  background-color: transparent;
  border: transparent;
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  cursor: pointer;
}
</style>

<style>
a:link {
  color: rgb(0, 0, 0);
  background-color: transparent;
  text-decoration: none;
}
a:visited {
  color: rgb(0, 0, 0);
  background-color: transparent;
  text-decoration: none;
}
a:hover {
  color: rgb(255, 94, 0);
  background-color: transparent;
  text-decoration: none;
}
.container {
  display: grid;
  grid-template-areas:
    "header header"
    "menu content"
    "footer footer";
  grid-template-columns: 0.5fr 3fr;
  gap: 10px;
  padding: 10px;
}
.container div {

  padding: 10px;
}
.container div.header {
  grid-area: header;
  text-align: left;
}
.container div.menu {
  grid-area: menu;
}
.container div.content {
  grid-area: content;
}
.container div.footer {
  grid-area: footer;
  text-align: right;  
}
.footer {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 97%;
  
  color: white;
  text-align: right;
}
<div class="footer">
  <p>Footer</p>
</div>
</style>
</head>
